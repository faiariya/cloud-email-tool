const SHEET_PUBLISHED_ID = "2PACX-1vTkBUAGXpN9uRjU5tKhpzJ56gmAzQkCTjl-YOpN8AOqu99piBaea08vuJY4ncEOegs8O-NdIZJ1xeDw";
const SHEET_GID = "0"; // ถ้าข้อมูลอยู่แท็บอื่น ให้เปลี่ยน gid ของแท็บนั้นตรงนี้
const SHEET_GVIZ_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_PUBLISHED_ID}/gviz/tq`;
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_PUBLISHED_ID}/pub?output=csv&gid=${SHEET_GID}`;

let lastSyncTime = null;

const COLUMN_ALIASES = {

    startDate: ["startdate", "start date", "วันที่เริ่ม", "วันเริ่ม", "เริ่มทดสอบ"],
    endDate: ["enddate", "end date", "วันที่สิ้นสุด", "วันสิ้นสุด", "หมดอายุ", "สิ้นสุดทดสอบ"],
    serviceType: ["servicetype", "service type", "service", "บริการ"],
    portalUser: ["portaluser", "portal user", "username portal", "portal username", "user portal"],
    portalLink: ["portallink", "portal link", "link portal", "url portal"],
    vmName: ["vmname", "vm name", "ชื่อvm", "ชื่อ vm"],
    ipPrivate: ["ipprivate", "ip private", "private ip", "ip ภายใน"],
    ipPublic: ["ippublic", "ip public", "public ip", "ip ภายนอก"],
    sshPort: ["sshport", "ssh port", "port ssh", "nat port", "port"],
    vmUser: ["vmuser", "vm user", "username vm", "user vm", "username"],
    vCpu: ["vcpu", "vcpu core", "vcpu (core)", "cpu", "core"],
    vRam: ["vram", "vram gb", "vram (gb)", "ram"],
    vDisk: ["vdisk", "vdisk gb", "vdisk (gb)", "disk"],
    os: ["os", "operating system"]
};

function normalizeHeader(value) {
    return String(value || "")
        .replace(/^\ufeff/, "")
        .replace(/\u200b/g, "")
        .trim()
        .toLowerCase()
        .replace(/[\s_\-()#/.:]+/g, "");
}

function normalizePoc(value) {
    return String(value || "")
        .replace(/^\ufeff/, "")
        .replace(/[\u200b\u200c\u200d\uFEFF]/g, "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/[‐‑‒–—―−]/g, "-");
}

function pocDigits(value) {
    return String(value || "").replace(/[^0-9]/g, "");
}

function isSamePoc(a, b) {
    const na = normalizePoc(a);
    const nb = normalizePoc(b);
    if (!na || !nb) return false;
    if (na === nb) return true;

    // เทียบจากตัวเลขล้วน เพื่อแก้ปัญหาเครื่องหมายขีด/ช่องว่าง/อักขระแฝงไม่เหมือนกัน
    const da = pocDigits(na);
    const db = pocDigits(nb);
    return da !== "" && db !== "" && da === db;
}

function parseCSV(csvText) {
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === '"') {
            if (inQuotes && next === '"') {
                cell += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (char === ',' && !inQuotes) {
            row.push(cell.trim());
            cell = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && next === '\n') i++;
            row.push(cell.trim());
            if (row.some(v => String(v).trim() !== "")) rows.push(row);
            row = [];
            cell = "";
        } else {
            cell += char;
        }
    }

    row.push(cell.trim());
    if (row.some(v => String(v).trim() !== "")) rows.push(row);
    return rows;
}

function getCellByAliases(rowObject, aliases) {
    for (const alias of aliases) {
        const key = normalizeHeader(alias);
        if (rowObject[key] !== undefined && rowObject[key] !== null && String(rowObject[key]).trim() !== "") {
            return String(rowObject[key]).trim();
        }
    }
    return "";
}

function findPocFromAnyCell(rowObject) {
    const values = rowObject.__rawValues || Object.values(rowObject);
    for (const value of values) {
        const text = String(value || "").trim();
        if (/POC\s*[-–—]?\s*\d+/i.test(text)) {
            const match = text.match(/POC\s*[-–—]?\s*\d+/i);
            return normalizePoc(match[0]).replace(/^POC(\d)/, "POC-$1");
        }
    }
    return "";
}

function mapSheetRowToData(rowObject) {
    const data = {};
    for (const [field, aliases] of Object.entries(COLUMN_ALIASES)) {
        data[field] = getCellByAliases(rowObject, aliases);
    }

    const fallbackPoc = findPocFromAnyCell(rowObject);

    // ค่า default กันช่องว่าง เพื่อไม่ให้ตารางแสดง undefined
    return {
        owner: data.owner || "-",
        pocNumber: data.pocNumber || fallbackPoc || "-",
        cusNo: data.cusNo || "-",
        saleEmail: data.saleEmail || "-",
        contactPerson: data.contactPerson || "-",
        customerTel: data.customerTel || "-",
        customerEmail: data.customerEmail || data.portalUser || "XXX@XXX.com",
        status: data.status || "-",
        uat: data.uat || "-",
        remark: data.remark || "-",
        package: data.package || "-",
        backup: data.backup || "-",
        customerName: data.customerName || (rowObject.__rawValues && rowObject.__rawValues[14]) || "-",
        startDate: data.startDate || "-",
        endDate: data.endDate || "-",
        serviceType: data.serviceType || "IaaS",
        portalUser: data.portalUser || data.customerEmail || "XXX",
        portalLink: data.portalLink || "XXX",
        vmName: data.vmName || "-",
        ipPrivate: data.ipPrivate || "-",
        ipPublic: data.ipPublic || "-",
        sshPort: data.sshPort || "",
        vmUser: data.vmUser || "-",
        vCpu: data.vCpu || "-",
        vRam: data.vRam || "-",
        vDisk: data.vDisk || "-",
        os: data.os || "-",
        __rawValues: rowObject.__rawValues || []
    };
}

function findHeaderRowIndex(rows) {
    // รองรับ Sheet ที่มีแถวหัวเรื่อง/แถวว่างก่อน header จริง
    const allAliases = Object.values(COLUMN_ALIASES).flat().map(normalizeHeader);
    let bestIndex = 0;
    let bestScore = -1;

    rows.slice(0, 20).forEach((row, index) => {
        const normalizedCells = row.map(normalizeHeader);
        let score = 0;
        normalizedCells.forEach(cell => {
            if (allAliases.includes(cell)) score++;
            if (["poc", "pocnumber", "sonumber", "so", "เลขpoc"].includes(cell)) score += 3;
        });
        if (score > bestScore) {
            bestScore = score;
            bestIndex = index;
        }
    });

    return bestIndex;
}

function gvizTableToRows(table) {
    const rows = [];
    const labels = (table.cols || []).map((col, index) => String(col.label || col.id || `Column ${index + 1}`).trim());
    if (labels.some(v => v !== "")) rows.push(labels);

    (table.rows || []).forEach(r => {
        const row = (r.c || []).map(cell => {
            if (!cell) return "";
            if (cell.f !== undefined && cell.f !== null) return String(cell.f).trim();
            if (cell.v !== undefined && cell.v !== null) return String(cell.v).trim();
            return "";
        });
        if (row.some(v => String(v).trim() !== "")) rows.push(row);
    });
    return rows;
}

function loadSheetRowsByJsonp() {
    return new Promise((resolve, reject) => {
        const callbackName = `sheetCallback_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
            cleanup();
            reject(new Error("โหลด Google Sheet ไม่สำเร็จ: JSONP timeout"));
        }, 15000);

        function cleanup() {
            clearTimeout(timeout);
            if (script.parentNode) script.parentNode.removeChild(script);
            try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
        }

        window[callbackName] = function(response) {
            cleanup();
            if (!response || response.status === "error") {
                const msg = response?.errors?.[0]?.detailed_message || response?.errors?.[0]?.message || "Google Sheet ตอบกลับเป็น error";
                reject(new Error(msg));
                return;
            }
            resolve(gvizTableToRows(response.table || {}));
        };

        const params = new URLSearchParams({
            tqx: `responseHandler:${callbackName};out:json`,
            tq: "select *",
            cacheBust: String(Date.now())
        });
        script.onerror = () => {
            cleanup();
            reject(new Error("โหลด Google Sheet ไม่สำเร็จ: script/jsonp ถูกบล็อก"));
        };
        script.src = `${SHEET_GVIZ_URL}?${params.toString()}`;
        document.body.appendChild(script);
    });
}

async function fetchTextWithTimeout(url, timeoutMs = 20000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
    } finally {
        clearTimeout(timer);
    }
}

async function loadSheetRowsByCsvFallback() {
    const directUrl = `${SHEET_CSV_URL}${SHEET_CSV_URL.includes("?") ? "&" : "?"}sync=${Date.now()}`;

    // เปิดจากไฟล์ในเครื่องหรือบาง Web Server อาจติด CORS จึงใส่ proxy สำรองไว้
    const urls = [
        directUrl,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`,
        `https://corsproxy.io/?${encodeURIComponent(directUrl)}`,
        `https://thingproxy.freeboard.io/fetch/${directUrl}`
    ];

    const errors = [];
    for (const url of urls) {
        try {
            const text = await fetchTextWithTimeout(url);
            const rows = parseCSV(text);
            if (rows.length > 0) return rows;
            errors.push("CSV ว่าง");
        } catch (error) {
            errors.push(error.message || String(error));
        }
    }
    throw new Error(`CSV โหลดไม่สำเร็จ: ${errors.join(" | ")}`);
}

async function loadSheetData(forceReload = false) {
    if (!forceReload && sheetDatabase.length > 0) return sheetDatabase;

    let rows = [];
    const errors = [];

    try {
        // วิธีหลัก: โหลด CSV ก่อน และมี CORS Proxy สำรอง
        rows = await loadSheetRowsByCsvFallback();
    } catch (csvError) {
        errors.push(csvError.message || String(csvError));
        console.warn("CSV/proxy load failed, trying JSONP", csvError);
        try {
            // วิธีสำรอง: GViz JSONP
            rows = await loadSheetRowsByJsonp();
        } catch (jsonpError) {
            errors.push(jsonpError.message || String(jsonpError));
            console.error(jsonpError);
            throw new Error(`Sync Google Sheet ไม่สำเร็จ (${errors.join(" | ")})`);
        }
    }

    if (rows.length < 2) {
        throw new Error("ไม่พบข้อมูลใน Google Sheet หรือ Sheet ยังไม่มีแถวข้อมูล");
    }

    const headerRowIndex = findHeaderRowIndex(rows);
    const headers = rows[headerRowIndex].map(normalizeHeader);

    sheetDatabase = rows.slice(headerRowIndex + 1).map(row => {
        const rowObject = { __rawValues: row };
        headers.forEach((header, index) => {
            if (header) rowObject[header] = row[index] || "";
        });
        return mapSheetRowToData(rowObject);
    }).filter(item => item.pocNumber && item.pocNumber !== "-");

    lastSyncTime = new Date();
    return sheetDatabase;
}

function findDataByPoc(database, pocInput) {
    const target = normalizePoc(pocInput);

    // หาแบบตรง + เทียบเลขล้วนจาก field pocNumber
    let found = database.find(item => isSamePoc(item.pocNumber, target));
    if (found) return found;

    // fallback: หาในทุก cell ของแถวนั้น เผื่อ POC อยู่คนละคอลัมน์ หรือมีอักขระพิเศษปน
    found = database.find(item => (item.__rawValues || []).some(cell => isSamePoc(cell, target)));
    if (found) return found;

    // fallback เพิ่ม: บาง cell อาจมีข้อความยาว เช่น "เลข POC: POC-202606060891"
    const targetDigits = pocDigits(target);
    return database.find(item => (item.__rawValues || []).some(cell => {
        const cellDigits = pocDigits(cell);
        return targetDigits && cellDigits && cellDigits.includes(targetDigits);
    }));
}
